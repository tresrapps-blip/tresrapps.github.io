<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>3Rsystem Cloud · Gestão Compartilhada</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232e7d32'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%23ffffff' font-family='Arial' font-weight='bold'%3E3R%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-body: #f5f7fb;
            --bg-app: #ffffff;
            --bg-header: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --accent: #2e7d32;
            --accent-hover: #1b5e2a;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e2e8f0;
            --menu-hover: #f1f5f9;
            --menu-active: #e0f2e7;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --input-border: #cbd5e1;
            --table-header-bg: #f8fafc;
            --table-row-hover: #f1f5f9;
            --status-available: #10b981;
            --status-low: #f59e0b;
        }

        body.dark-theme {
            --bg-body: #0f172a;
            --bg-app: #1e293b;
            --bg-header: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent: #4caf7a;
            --accent-hover: #66bb8a;
            --sidebar-bg: #1e293b;
            --sidebar-border: #334155;
            --menu-hover: #334155;
            --menu-active: #2d7242;
            --card-bg: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --input-border: #475569;
            --table-header-bg: #0f172a;
            --table-row-hover: #334155;
        }

        body {
            background: var(--bg-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: background 0.2s;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            background: var(--bg-app);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .app-header {
            padding: 12px 24px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.2rem;
        }

        .app-header i {
            color: var(--accent);
            font-size: 1.6rem;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .sync-status {
            font-size: 0.75rem;
            background: var(--menu-hover);
            padding: 4px 10px;
            border-radius: 0px;
        }

        .user-header-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--menu-hover);
            padding: 6px 12px;
        }

        .logout-header-btn {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
        }

        .layout {
            display: flex;
            flex: 1;
            min-height: 0;
            background: var(--bg-body);
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            transition: width 0.2s;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar-header {
            padding: 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--sidebar-border);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px 8px;
        }

        .menu {
            flex: 1;
            padding: 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            color: var(--text-secondary);
            font-weight: 500;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .menu-item i {
            width: 24px;
            color: var(--accent);
        }

        .menu-item:hover {
            background: var(--menu-hover);
            border-left-color: var(--accent);
        }

        .menu-item.active {
            background: var(--menu-active);
            border-left-color: var(--accent-hover);
            color: var(--accent-hover);
        }

        .sidebar.collapsed .menu-item span {
            display: none;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--sidebar-border);
        }

        .theme-footer-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 8px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            background: var(--bg-body);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }

        h2, h3 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .excel-table th {
            background: var(--table-header-bg);
            text-align: left;
            padding: 12px 10px;
            border: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
        }

        .excel-table td {
            padding: 10px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .excel-table tbody tr:hover {
            background: var(--table-row-hover);
        }

        input, select, textarea, button {
            border: 1px solid var(--input-border);
            padding: 8px 12px;
            font-size: 0.85rem;
            background: var(--card-bg);
            color: var(--text-primary);
            outline: none;
            border-radius: 0px;
        }

        .btn {
            background: transparent;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent-hover);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .photos-stack img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .cart-table-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            margin: 16px 0;
        }

        .push-notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            padding: 12px 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.2s;
            pointer-events: none;
        }

        .push-notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 28px;
            width: 520px;
            max-width: 90%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
        }

        @media (max-width: 680px) {
            body { padding: 0; }
            .sidebar { width: 100%; border-bottom: 1px solid var(--border-color); }
            .sidebar.collapsed { width: 100%; }
            .content { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <i class="fas fa-store"></i>
        <span>3Rsystem Cloud</span>
        <div class="header-actions">
            <span id="relogio" style="font-size: 0.8rem;"></span>
            <span id="syncStatus" class="sync-status"><i class="fas fa-sync-alt"></i> Sincronizado</span>
            <div id="userHeaderArea" style="display: none;" class="user-header-area">
                <i class="fas fa-user-circle"></i>
                <span id="headerUserName"></span>
            </div>
            <button id="logoutHeaderBtn" style="display: none;" class="logout-header-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </div>
    <div class="layout" id="layout"></div>
</div>

<div id="pushNotification" class="push-notification"></div>
<div id="adminModal" class="modal-overlay" style="display: none;"><div class="modal-card"><h4>Autorização Admin</h4><input type="password" id="adminPassInput" placeholder="Senha master" style="width:100%; margin:16px 0"><div style="display:flex; gap:12px; justify-content:flex-end"><button id="cancelAdminBtn">Cancelar</button><button id="confirmAdminBtn" class="btn-primary">Confirmar</button></div></div></div>
<div id="productModal" class="modal-overlay" style="display: none;"><div class="modal-card"><h4 id="productModalTitle">Produto</h4><input type="text" id="prodNome" placeholder="Nome" style="width:100%; margin-bottom:12px"><input type="number" id="prodPreco" placeholder="Preço R$" step="0.01"><input type="number" id="prodQtd" placeholder="Quantidade"><input type="text" id="prodUnidade" placeholder="Unidade"><input type="number" id="prodMinima" placeholder="Estoque mínimo"><input type="text" id="prodCodigo" placeholder="Código"><input type="text" id="prodCategoria" placeholder="Categoria"><div><label>Fotos (max 2)</label></div><div id="photoPreviewArea" style="display:flex; gap:12px; margin:8px 0"><img id="photoPreview0" width="64" height="64" style="border:1px solid var(--border-color)"><img id="photoPreview1" width="64" height="64" style="border:1px solid var(--border-color)"></div><input type="file" id="photoUploader" accept="image/*" style="margin:8px 0"><div style="display:flex; gap:12px; justify-content:flex-end; margin-top:16px"><button id="cancelProductBtn">Cancelar</button><button id="saveProductBtn" class="btn-primary">Salvar</button></div></div></div>
<div id="clienteModal" class="modal-overlay" style="display: none;"><div class="modal-card"><h4>Cliente</h4><input type="text" id="clienteNome" placeholder="Nome *"><input type="text" id="clienteTelefone" placeholder="Telefone"><input type="text" id="clienteDocumento" placeholder="CPF/CNPJ"><textarea id="clienteEndereco" rows="2" placeholder="Endereço"></textarea><textarea id="clienteObservacao" rows="2" placeholder="Observação"></textarea><div style="display:flex; gap:12px; justify-content:flex-end; margin-top:16px"><button id="cancelClienteBtn">Cancelar</button><button id="saveClienteBtn" class="btn-primary">Salvar</button></div></div></div>
<div id="usuarioModal" class="modal-overlay" style="display: none;"><div class="modal-card"><h4>Usuário</h4><input type="text" id="usuarioNome" placeholder="Nome"><input type="text" id="usuarioLogin" placeholder="Login"><input type="password" id="usuarioSenha" placeholder="Senha"><select id="usuarioRole"><option value="seller">Vendedor</option><option value="admin">Administrador</option></select><div style="display:flex; gap:12px; justify-content:flex-end; margin-top:16px"><button id="cancelUsuarioBtn">Cancelar</button><button id="saveUsuarioBtn" class="btn-primary">Salvar</button></div></div></div>
<div id="comprovanteModal" class="modal-overlay" style="display: none;"><div class="modal-card"><div id="comprovanteContent"></div><div style="margin-top:16px"><button id="fecharComprovanteBtn">Fechar</button><a id="downloadComprovanteLink" class="btn-primary" style="text-decoration:none; margin-left:8px;">Baixar</a></div></div></div>

<script>
    // ------------------------- GITHUB API INTEGRATION (CONFIGURADO) -------------------------
    const GITHUB_TOKEN = "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";
    const REPO_OWNER = "SEU_USUARIO";     
    const REPO_NAME = "SEU_REPOSITORIO";   
    const DATA_PATH = "data/";

    let currentUser = null;
    let currentSection = "vendas";
    let sidebarExpanded = true;
    let carrinho = [];
    let clienteSelecionado = null;
    let metodoPagamento = null;
    let editingProductId = null, editingUserId = null, editingClienteId = null;
    let tempPhotos = ["", ""];
    let currentPixBase64 = null;
    let localCache = { produtos: [], clientes: [], vendas: [], users: [], logs: [], config: { estilo: "moderno" } };
    let lastSync = 0;

    function showPush(msg, isError = false) {
        const el = document.getElementById("pushNotification");
        el.textContent = msg;
        el.classList.add("show");
        if (isError) el.style.borderLeftColor = "#d32f2f";
        else el.style.borderLeftColor = "var(--accent)";
        setTimeout(() => el.classList.remove("show"), 2800);
    }

    async function githubRequest(endpoint, method = "GET", body = null) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${endpoint}`;
        const headers = {
            Authorization: `token ${GITHUB_TOKEN}`,
            Accept: "application/vnd.github.v3+json",
        };
        if (body) headers["Content-Type"] = "application/json";
        const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
        if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
        return res.json();
    }

    async function readJSON(fileName) {
        try {
            const { content } = await githubRequest(`contents/${DATA_PATH}${fileName}`, "GET");
            return JSON.parse(atob(content));
        } catch (e) {
            if (e.message.includes("404")) return null;
            throw e;
        }
    }

    async function writeJSON(fileName, data, commitMsg) {
        let sha = null;
        try {
            const existing = await githubRequest(`contents/${DATA_PATH}${fileName}`, "GET");
            sha = existing.sha;
        } catch(e) {}
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const body = { message: commitMsg, content, sha };
        await githubRequest(`contents/${DATA_PATH}${fileName}`, "PUT", body);
    }

    async function syncFromGitHub() {
        try {
            const [produtos, clientes, vendas, users, logs, config] = await Promise.all([
                readJSON("produtos.json"), readJSON("clientes.json"), readJSON("vendas.json"),
                readJSON("users.json"), readJSON("logs.json"), readJSON("config.json")
            ]);
            localCache.produtos = produtos || [];
            localCache.clientes = clientes || [];
            localCache.vendas = vendas || [];
            localCache.users = users || [];
            localCache.logs = logs || [];
            localCache.config = config || { estilo: "moderno" };
            
            if (!localCache.users.length) {
                localCache.users = [
                    { id: "1", username: "admin", password: "Pedro@2017", role: "admin", nome: "Admin Master" },
                    { id: "2", username: "vendedor", password: "1234", role: "seller", nome: "Vendedor" }
                ];
                await writeJSON("users.json", localCache.users, "Usuários padrão");
            }
            if (!localCache.produtos.length) await writeJSON("produtos.json", [], "Inicialização");
            if (!localCache.clientes.length) await writeJSON("clientes.json", [], "Inicialização");
            if (!localCache.vendas.length) await writeJSON("vendas.json", [], "Inicialização");
            if (!localCache.logs.length) await writeJSON("logs.json", [], "Inicialização");
            if (!localCache.config) await writeJSON("config.json", { estilo: "moderno" }, "Config padrão");
            
            document.getElementById("syncStatus").innerHTML = `<i class="fas fa-check-circle"></i> Sincronizado ${new Date().toLocaleTimeString()}`;
            showPush("Dados sincronizados com GitHub");
            return true;
        } catch(e) {
            showPush("Erro sincronização: " + e.message, true);
            return false;
        }
    }

    async function syncToGitHub(collection, data, msg) {
        if (collection === "produtos") await writeJSON("produtos.json", data, msg);
        if (collection === "clientes") await writeJSON("clientes.json", data, msg);
        if (collection === "vendas") await writeJSON("vendas.json", data, msg);
        if (collection === "users") await writeJSON("users.json", data, msg);
        if (collection === "logs") await writeJSON("logs.json", data, msg);
        if (collection === "config") await writeJSON("config.json", data, msg);
        await syncFromGitHub();
    }

    async function addLog(acao, detalhes) {
        if (!currentUser) return;
        const logEntry = {
            data: new Date().toLocaleString("pt-BR"),
            timestamp: Date.now(),
            usuario: currentUser.nome,
            acao, detalhes
        };
        localCache.logs.unshift(logEntry);
        if (localCache.logs.length > 1000) localCache.logs.pop();
        await syncToGitHub("logs", localCache.logs, `Log: ${acao}`);
    }

    async function atualizarEstoque(itensVendidos) {
        for (const item of itensVendidos) {
            if (item.id) {
                const prod = localCache.produtos.find(p => p.id == item.id);
                if (prod) {
                    prod.qtdAtual = (prod.qtdAtual || 0) - item.qtd;
                    await syncToGitHub("produtos", localCache.produtos, `Estoque atualizado: ${prod.nome}`);
                }
            }
        }
    }

    function gerarRecibo(venda, estilo) {
        const win = window.open("", "_blank", "width=500,height=700");
        let html = "";
        const comprovanteHtml = venda.comprovanteBase64 ? `<p><strong>Comprovante PIX:</strong> <a href="${venda.comprovanteBase64}" download>Baixar</a></p>` : "";
        if(estilo === "termico") {
            html = `<pre>================================\n3Rsystem\n================================\nData: ${venda.data}\nCliente: ${venda.cliente}\n--------------------------------\n${venda.itens.map(i=>`${i.nome} ${i.qtd}x R$ ${(i.preco*i.qtd).toFixed(2)}`).join("\n")}\n--------------------------------\nTOTAL: R$ ${venda.total.toFixed(2)}\nPagamento: ${venda.pagamento}\nObservação: ${venda.observacao||"-"}\n================================\nObrigado!</pre>`;
        } else {
            html = `<html><head><meta charset="UTF-8"><title>Recibo</title><style>body{font-family:Inter;padding:30px;}</style></head><body><div><h2>3Rsystem</h2><p>Data: ${venda.data}</p><p>Cliente: ${venda.cliente}</p><table border="1" cellpadding="8">${venda.itens.map(i=>`<tr><td>${i.nome}</td><td>${i.qtd}x</td><td>R$ ${(i.preco*i.qtd).toFixed(2)}</td></tr>`).join("")}</table><h3>Total: R$ ${venda.total.toFixed(2)}</h3><p>Pagamento: ${venda.pagamento}</p>${comprovanteHtml}</div></body></html>`;
        }
        win.document.write(html);
        win.document.close();
        win.print();
    }

    function openLightbox(photos) { if(!photos?.length) return; const lb = document.createElement("div"); lb.className="lightbox"; lb.innerHTML = `<div style="display:flex; gap:20px; flex-wrap:wrap;">${photos.map(src=>`<img src="${src}" style="max-width:80vw; max-height:80vh;">`).join("")}</div><button style="position:absolute; top:20px; right:30px; background:white; border:none; font-size:30px;">&times;</button>`; lb.onclick = e => { if(e.target===lb||e.target.tagName==="BUTTON") lb.remove(); }; document.body.appendChild(lb); }

    async function renderApp() {
        const layout = document.getElementById("layout");
        const userArea = document.getElementById("userHeaderArea");
        const logoutBtn = document.getElementById("logoutHeaderBtn");
        const headerName = document.getElementById("headerUserName");
        if(!currentUser) {
            userArea.style.display = "none";
            logoutBtn.style.display = "none";
            layout.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center;"><div class="card" style="width:400px;"><h3>Acesso</h3><input type="text" id="loginUser" placeholder="Usuário" style="width:100%; margin-bottom:16px;"><input type="password" id="loginPass" placeholder="Senha" style="width:100%; margin-bottom:24px;"><button class="btn-primary" id="btnLogin" style="width:100%;">Entrar</button></div></div>`;
            document.getElementById("btnLogin")?.addEventListener("click", async () => {
                const user = document.getElementById("loginUser").value;
                const pass = document.getElementById("loginPass").value;
                await syncFromGitHub();
                const found = localCache.users.find(u => u.username === user && u.password === pass);
                if(found) {
                    currentUser = { ...found };
                    showPush(`Bem-vindo, ${currentUser.nome}`);
                    await addLog("Login", `${currentUser.nome} entrou`);
                    renderApp();
                } else showPush("Credenciais inválidas", true);
            });
            return;
        }
        userArea.style.display = "flex";
        logoutBtn.style.display = "flex";
        headerName.textContent = currentUser.nome;
        logoutBtn.onclick = () => { currentUser = null; carrinho=[]; renderApp(); };
        const isAdmin = currentUser.role === "admin";
        let menuItems = `<button class="menu-item ${currentSection==="vendas"?"active":""}" data-section="vendas"><i class="fas fa-cash-register"></i><span>Vendas</span></button>
                         <button class="menu-item ${currentSection==="produtos"?"active":""}" data-section="produtos"><i class="fas fa-boxes"></i><span>Produtos</span></button>
                         <button class="menu-item ${currentSection==="clientes"?"active":""}" data-section="clientes"><i class="fas fa-users"></i><span>Clientes</span></button>`;
        if(isAdmin) menuItems += `<button class="menu-item ${currentSection==="relatorios"?"active":""}" data-section="relatorios"><i class="fas fa-chart-line"></i><span>Relatórios</span></button>
                                  <button class="menu-item ${currentSection==="usuarios"?"active":""}" data-section="usuarios"><i class="fas fa-user-plus"></i><span>Usuários</span></button>
                                  <button class="menu-item ${currentSection==="logs"?"active":""}" data-section="logs"><i class="fas fa-history"></i><span>Logs</span></button>
                                  <button class="menu-item ${currentSection==="config"?"active":""}" data-section="config"><i class="fas fa-sliders-h"></i><span>Configurações</span></button>`;
        layout.innerHTML = `<div class="sidebar ${sidebarExpanded?"":"collapsed"}"><div class="sidebar-header"><h3>MENU</h3><button class="toggle-btn" id="toggleSidebar"><i class="fas fa-${sidebarExpanded?"angle-left":"angle-right"}"></i></button></div><div class="menu">${menuItems}</div><div class="sidebar-footer"><button id="themeFooterBtn" class="theme-footer-btn"><i class="fas ${localStorage.theme==='dark'?'fa-moon':'fa-sun'}"></i><span>Tema</span></button></div></div><div class="content" id="contentArea"></div>`;
        document.getElementById("toggleSidebar")?.addEventListener("click", () => { sidebarExpanded = !sidebarExpanded; renderApp(); });
        document.querySelectorAll(".menu-item").forEach(btn => btn.addEventListener("click", () => { currentSection = btn.dataset.section; renderApp(); }));
        document.getElementById("themeFooterBtn")?.addEventListener("click", () => {
            const isDark = document.body.classList.toggle("dark-theme");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            renderApp();
        });
        await renderContent();
    }

    async function renderContent() {
        const area = document.getElementById("contentArea");
        if(!area) return;
        if(currentSection === "vendas") area.innerHTML = await renderVendas();
        else if(currentSection === "produtos") area.innerHTML = await renderProdutos();
        else if(currentSection === "clientes") area.innerHTML = await renderClientes();
        else if(currentSection === "relatorios") area.innerHTML = await renderRelatorios();
        else if(currentSection === "config") area.innerHTML = renderConfig();
        else if(currentSection === "usuarios") area.innerHTML = await renderUsuarios();
        else if(currentSection === "logs") area.innerHTML = await renderLogs();
        attachEvents();
    }

    async function renderVendas() {
        const produtos = localCache.produtos.filter(p => p.ativo !== false);
        const clientes = localCache.clientes;
        let totalCarrinho = carrinho.reduce((s,i)=> s+(i.preco*i.qtd),0);
        let carrinhoHtml = carrinho.map((item,idx)=>`<tr><td>${item.nome}</td><td>R$ ${item.preco.toFixed(2)}</td><td>${item.qtd}</td><td>R$ ${(item.preco*item.qtd).toFixed(2)}</td><td><button class="btn remove-item" data-idx="${idx}"><i class="fas fa-trash"></i></button></td></tr>`).join("");
        return `<div class="card"><h3><i class="fas fa-tag"></i> Nova Venda</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;"><div><label>Produto</label><input type="text" id="buscaProduto" list="prodList"><datalist id="prodList">${produtos.map(p=>`<option>${p.nome}</option>`).join("")}</datalist><button id="addProdutoBtn" class="btn-primary">+ Adicionar</button></div><div><label>Cliente</label><select id="selectCliente"><option value="">Avulso</option>${clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join("")}</select></div></div><div class="cart-table-container"><table class="excel-table"><thead><tr><th>Item</th><th>Preço</th><th>Qtd</th><th>Subtotal</th><th></th></tr></thead><tbody>${carrinhoHtml||'<tr><td colspan="5">Carrinho vazio</td></tr>'}</tbody></table></div><textarea id="observacaoVenda" rows="2" placeholder="Observação"></textarea><div><button id="aplicarDescontoBtn" class="btn"><i class="fas fa-percent"></i> Desconto (admin)</button></div><div><strong>Pagamento:</strong><div style="display:flex; gap:10px; margin:10px 0;">${["dinheiro","debito","pix","credito"].map(m=>`<button class="btn metodo-pag" data-metodo="${m}">${m.toUpperCase()}</button>`).join("")}</div><div id="detalhePagamento"></div><div id="pixArea" style="display:none;"><input type="file" id="pixFile" accept="image/*,application/pdf"></div><button id="finalizarVendaBtn" class="btn-primary">Finalizar Venda</button></div></div>`;
    }
    async function renderProdutos() {
        let html = `<div class="card"><h3><i class="fas fa-box"></i> Produtos</h3><button id="novoProdutoBtn" class="btn-primary">+ Novo Produto</button><table class="excel-table"><thead><tr><th>Foto</th><th>Código</th><th>Nome</th><th>Categoria</th><th>Estoque</th><th>Preço</th><th>Ações</th></tr></thead><tbody>`;
        localCache.produtos.forEach(p => {
            let fotoHtml = p.photos?.length ? `<img src="${p.photos[0]}" style="width:36px; height:36px; object-fit:cover; cursor:pointer;" data-photos='${JSON.stringify(p.photos)}'>` : "<i class='fas fa-camera'></i>";
            html += `<tr><td>${fotoHtml}</td><td>${p.codigo||"-"}</td><td>${p.nome}</td><td>${p.categoria||"-"}</td><td>${p.qtdAtual} ${p.unidade||"un"}</td><td>R$ ${p.preco}</td><td><button class="editProd" data-id="${p.id}"><i class="fas fa-edit"></i></button> <button class="delProd" data-id="${p.id}"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        html += `</tbody></table></div>`;
        return html;
    }
    async function renderClientes() {
        let html = `<div class="card"><h3>Clientes</h3><button id="novoClienteBtn" class="btn-primary">+ Novo</button><table class="excel-table"><thead><tr><th>Nome</th><th>Telefone</th><th>Documento</th><th>Endereço</th><th>Obs</th><th>Ações</th></tr></thead><tbody>`;
        localCache.clientes.forEach(c => html += `<tr><td>${c.nome}</td><td>${c.telefone||"-"}</td><td>${c.documento||"-"}</td><td>${c.endereco||"-"}</td><td>${c.observacao||"-"}</td><td><button class="editCliente" data-id="${c.id}"><i class="fas fa-edit"></i></button> <button class="delCliente" data-id="${c.id}"><i class="fas fa-trash"></i></button></td></tr>`);
        html += `</tbody></table></div>`;
        return html;
    }
    async function renderRelatorios() { return `<div class="card"><h3>Relatório Vendas</h3><div><input type="date" id="relInicio"><input type="date" id="relFim"><button id="filtrarRel" class="btn-primary">Filtrar</button></div><div id="relResultado"></div></div>`; }
    function renderConfig() { return `<div class="card"><h3><i class="fas fa-cog"></i> Configurações Avançadas</h3><div style="display:grid; gap:20px;"><div><label>Estilo Recibo</label><select id="estiloRecibo"><option value="moderno">Moderno</option><option value="termico">Térmico</option></select><button id="salvarEstilo" class="btn-primary">Salvar</button></div><div><label>Tema</label><div><button id="temaClaroBtn">🌞 Claro</button> <button id="temaEscuroBtn">🌙 Escuro</button></div></div><div><label>Limpar Logs antigos</label><button id="limparLogsBtn">Limpar logs (>500)</button></div><div><label>Exportar Backup</label><button id="exportarBackupBtn"><i class="fas fa-download"></i> Exportar JSON</button> <button id="importarBackupBtn"><i class="fas fa-upload"></i> Importar</button><input type="file" id="importFile" accept=".json" style="display:none;"></div><div><label>Sincronizar Manual</label><button id="syncManualBtn" class="btn-primary"><i class="fas fa-sync"></i> Sincronizar agora</button></div></div></div>`; }
    async function renderUsuarios() { let html = `<div class="card"><h3>Usuários</h3><button id="novoUsuarioBtn" class="btn-primary">+ Usuário</button><table class="excel-table"><thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Ações</th></tr></thead><tbody>`; localCache.users.forEach(u => html += `<tr><td>${u.nome}</td><td>${u.username}</td><td>${u.role==="admin"?"Admin":"Vendedor"}</td><td><button class="editUser" data-id="${u.id}">✏️</button> ${u.id !== currentUser.id ? `<button class="delUser" data-id="${u.id}">🗑️</button>` : ""}</td></tr>`); html += `</tbody></table></div>`; return html; }
    async function renderLogs() { let logsHtml = localCache.logs.slice(0,200).map(l=>`<tr><td>${l.data}</td><td>${l.usuario}</td><td>${l.acao}</td><td>${l.detalhes}</td></tr>`).join(""); return `<div class="card"><h3>Logs</h3><table class="excel-table"><thead><tr><th>Data</th><th>Usuário</th><th>Ação</th><th>Detalhes</th></tr></thead><tbody>${logsHtml||'<tr><td colspan="4">Sem registros</td></tr>'}</tbody></table></div>`; }

    async function attachEvents() {
        if(currentSection === "vendas") {
            document.getElementById("addProdutoBtn")?.addEventListener("click", ()=>{
                const nome = document.getElementById("buscaProduto").value;
                const prod = localCache.produtos.find(p=>p.nome.toLowerCase()===nome.toLowerCase());
                if(!prod) return showPush("Produto não existe",true);
                let qtd = parseFloat(prompt("Quantidade:",1));
                if(isNaN(qtd)) qtd=1;
                if(prod.qtdAtual < qtd) return showPush("Estoque insuficiente",true);
                carrinho.push({ id: prod.id, nome: prod.nome, preco: prod.preco, qtd });
                renderApp();
            });
            document.querySelectorAll(".remove-item").forEach(btn=>btn.addEventListener("click",(e)=>{
                const idx = e.currentTarget.dataset.idx;
                solicitarAdmin(ok=>{ if(ok){ carrinho.splice(idx,1); renderApp(); } });
            }));
            document.getElementById("aplicarDescontoBtn")?.addEventListener("click",()=>solicitarAdmin(ok=>{ if(ok){ let perc = parseFloat(prompt("% desconto:")); if(isNaN(perc)) return; let total = carrinho.reduce((s,i)=>s+(i.preco*i.qtd),0); carrinho.push({ id:null, nome:"DESCONTO", preco: -total*(perc/100), qtd:1 }); renderApp(); } }));
            document.querySelectorAll(".metodo-pag").forEach(b=>b.addEventListener("click",(e)=>{ metodoPagamento=e.currentTarget.dataset.metodo; let div=document.getElementById("detalhePagamento"); if(metodoPagamento==="dinheiro") div.innerHTML=`<input type="number" id="valorRecebido" placeholder="Valor recebido">`; else div.innerHTML=`<input type="text" placeholder="Comprovante (opcional)">`; document.getElementById("pixArea").style.display= metodoPagamento==="pix"?"block":"none"; }));
            document.getElementById("finalizarVendaBtn")?.addEventListener("click", async ()=>{
                if(!carrinho.length) return showPush("Carrinho vazio",true);
                if(!metodoPagamento) return showPush("Selecione pagamento",true);
                let total = carrinho.reduce((s,i)=>s+(i.preco*i.qtd),0);
                let obs = document.getElementById("observacaoVenda")?.value;
                let clienteId = document.getElementById("selectCliente")?.value;
                let clienteNome = clienteId ? localCache.clientes.find(c=>c.id==clienteId)?.nome : "Avulso";
                let comprovante = null;
                if(metodoPagamento === "pix" && document.getElementById("pixFile")?.files[0]) {
                    const file = document.getElementById("pixFile").files[0];
                    const reader = new FileReader();
                    comprovante = await new Promise(resolve=>{ reader.onload=e=>resolve(e.target.result); reader.readAsDataURL(file); });
                }
                let pagamentoInfo = metodoPagamento === "dinheiro" ? `Dinheiro R$ ${document.getElementById("valorRecebido")?.value || "0"}` : `${metodoPagamento.toUpperCase()}`;
                await atualizarEstoque(carrinho);
                const vendaObj = { id: Date.now().toString(), data: new Date().toLocaleString(), dataISO: new Date().toISOString(), itens: [...carrinho], total, cliente: clienteNome, pagamento: pagamentoInfo, observacao: obs, comprovanteBase64: comprovante };
                localCache.vendas.unshift(vendaObj);
                await syncToGitHub("vendas", localCache.vendas, `Venda R$ ${total}`);
                await addLog("Venda finalizada", `Total R$ ${total}`);
                gerarRecibo(vendaObj, localCache.config.estilo);
                carrinho = []; metodoPagamento=null;
                renderApp();
            });
        }
        if(currentSection === "produtos") {
            document.getElementById("novoProdutoBtn")?.addEventListener("click",()=>openProductModal(null));
            document.querySelectorAll(".editProd").forEach(b=>b.addEventListener("click",async(e)=>{ const id=e.currentTarget.dataset.id; const prod=localCache.produtos.find(p=>p.id==id); openProductModal(prod); }));
            document.querySelectorAll(".delProd").forEach(b=>b.addEventListener("click",async(e)=>{ if(confirm("Excluir?")){ const id=e.currentTarget.dataset.id; localCache.produtos=localCache.produtos.filter(p=>p.id!=id); await syncToGitHub("produtos",localCache.produtos,"Produto excluído"); renderApp(); } }));
            document.querySelectorAll("img[data-photos]").forEach(img=>img.addEventListener("click",(e)=>{ const arr=JSON.parse(e.currentTarget.dataset.photos); if(arr.length) openLightbox(arr); }));
        }
        if(currentSection === "clientes") {
            document.getElementById("novoClienteBtn")?.addEventListener("click",()=>openClienteModal(null));
            document.querySelectorAll(".editCliente").forEach(b=>b.addEventListener("click",async(e)=>{ const id=e.currentTarget.dataset.id; const c=localCache.clientes.find(c=>c.id==id); openClienteModal(c); }));
            document.querySelectorAll(".delCliente").forEach(b=>b.addEventListener("click",async(e)=>{ if(confirm("Excluir?")){ const id=e.currentTarget.dataset.id; localCache.clientes=localCache.clientes.filter(c=>c.id!=id); await syncToGitHub("clientes",localCache.clientes,"Cliente removido"); renderApp(); } }));
        }
        if(currentSection === "relatorios") {
            document.getElementById("filtrarRel")?.addEventListener("click",()=>{
                let inicio = document.getElementById("relInicio").value, fim = document.getElementById("relFim").value;
                let filtradas = localCache.vendas.filter(v=>{ let d = new Date(v.dataISO); if(inicio && d < new Date(inicio)) return false; if(fim && d > new Date(fim)) return false; return true; });
                let total = filtradas.reduce((s,v)=>s+v.total,0);
                document.getElementById("relResultado").innerHTML = `<p>${filtradas.length} vendas - Total R$ ${total.toFixed(2)}</p><table class="excel-table"><thead><tr><th>Data</th><th>Cliente</th><th>Total</th><th>Pagamento</th></tr></thead><tbody>${filtradas.map(v=>`<tr><td>${v.data}</td><td>${v.cliente}</td><td>R$ ${v.total.toFixed(2)}</td><td>${v.pagamento}</td></tr>`).join("")}</tbody></table>`;
            });
        }
        if(currentSection === "config") {
            document.getElementById("salvarEstilo")?.addEventListener("click",async()=>{ localCache.config.estilo = document.getElementById("estiloRecibo").value; await syncToGitHub("config", localCache.config, "Estilo recibo"); showPush("Config salva"); });
            document.getElementById("temaClaroBtn")?.addEventListener("click",()=>{ document.body.classList.remove("dark-theme"); localStorage.setItem("theme","light"); renderApp(); });
            document.getElementById("temaEscuroBtn")?.addEventListener("click",()=>{ document.body.classList.add("dark-theme"); localStorage.setItem("theme","dark"); renderApp(); });
            document.getElementById("limparLogsBtn")?.addEventListener("click",async()=>{ localCache.logs = localCache.logs.slice(0,500); await syncToGitHub("logs", localCache.logs, "Limpeza logs"); showPush("Logs reduzidos"); });
            document.getElementById("exportarBackupBtn")?.addEventListener("click",()=>{ const data = { produtos:localCache.produtos, clientes:localCache.clientes, vendas:localCache.vendas, config:localCache.config }; const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)])); a.download="backup_3r.json"; a.click(); });
            document.getElementById("importarBackupBtn")?.addEventListener("click",()=>document.getElementById("importFile").click());
            document.getElementById("importFile")?.addEventListener("change",async(e)=>{ const file=e.target.files[0]; const reader=new FileReader(); reader.onload=async(ev)=>{ try{ const data=JSON.parse(ev.target.result); if(data.produtos) localCache.produtos=data.produtos; if(data.clientes) localCache.clientes=data.clientes; if(data.vendas) localCache.vendas=data.vendas; await syncToGitHub("produtos",localCache.produtos,"Importação"); await syncToGitHub("clientes",localCache.clientes,"Importação"); await syncToGitHub("vendas",localCache.vendas,"Importação"); showPush("Backup importado"); renderApp(); }catch(e){ showPush("Erro importação",true); } }; reader.readAsText(file); });
            document.getElementById("syncManualBtn")?.addEventListener("click",async()=>{ await syncFromGitHub(); renderApp(); });
        }
        if(currentSection === "usuarios") {
            document.getElementById("novoUsuarioBtn")?.addEventListener("click",()=>openUsuarioModal(null));
            document.querySelectorAll(".editUser").forEach(b=>b.addEventListener("click",async(e)=>{ const id=e.currentTarget.dataset.id; const u=localCache.users.find(u=>u.id==id); openUsuarioModal(u); }));
            document.querySelectorAll(".delUser").forEach(b=>b.addEventListener("click",async(e)=>{ if(confirm("Excluir usuário?")){ const id=e.currentTarget.dataset.id; localCache.users=localCache.users.filter(u=>u.id!=id); await syncToGitHub("users",localCache.users,"Usuário removido"); renderApp(); } }));
        }
    }

    function solicitarAdmin(callback){
        const modal = document.getElementById("adminModal");
        const input = document.getElementById("adminPassInput");
        input.value = "";
        modal.style.display = "flex";
        const confirm = async()=>{
            const pass = input.value;
            const adminExists = localCache.users.find(u=>u.role==="admin" && u.password===pass);
            modal.style.display = "none";
            callback(!!adminExists);
            if(!adminExists) showPush("Acesso negado",true);
        };
        document.getElementById("confirmAdminBtn").onclick = confirm;
        document.getElementById("cancelAdminBtn").onclick = ()=>{ modal.style.display="none"; callback(false); };
    }

    function openProductModal(prod){
        editingProductId = prod?.id||null;
        document.getElementById("prodNome").value = prod?.nome||"";
        document.getElementById("prodPreco").value = prod?.preco||"";
        document.getElementById("prodQtd").value = prod?.qtdAtual||0;
        document.getElementById("prodUnidade").value = prod?.unidade||"un";
        document.getElementById("prodMinima").value = prod?.qtdMinima||0;
        document.getElementById("prodCodigo").value = prod?.codigo||"";
        document.getElementById("prodCategoria").value = prod?.categoria||"";
        tempPhotos = prod?.photos ? [prod.photos[0]||"", prod.photos[1]||""] : ["",""];
        document.getElementById("photoPreview0").src = tempPhotos[0]||"";
        document.getElementById("photoPreview1").src = tempPhotos[1]||"";
        document.getElementById("productModal").style.display = "flex";
        const uploader = document.getElementById("photoUploader");
        uploader.onchange = (e)=>{
            const file = e.target.files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = ev=>{
                    if(!tempPhotos[0]) tempPhotos[0]=ev.target.result;
                    else tempPhotos[1]=ev.target.result;
                    document.getElementById("photoPreview0").src = tempPhotos[0];
                    document.getElementById("photoPreview1").src = tempPhotos[1];
                };
                reader.readAsDataURL(file);
            }
        };
        document.getElementById("saveProductBtn").onclick = async ()=>{
            const nome = document.getElementById("prodNome").value;
            if(!nome) return showPush("Nome obrigatório",true);
            const prodData = { id: editingProductId || Date.now().toString(), nome, preco: parseFloat(document.getElementById("prodPreco").value), qtdAtual: parseFloat(document.getElementById("prodQtd").value), unidade: document.getElementById("prodUnidade").value, qtdMinima: parseFloat(document.getElementById("prodMinima").value), codigo: document.getElementById("prodCodigo").value, categoria: document.getElementById("prodCategoria").value, photos: tempPhotos.filter(p=>p), ativo:true };
            if(editingProductId){
                const idx = localCache.produtos.findIndex(p=>p.id==editingProductId);
                if(idx!==-1) localCache.produtos[idx] = prodData;
            } else localCache.produtos.push(prodData);
            await syncToGitHub("produtos", localCache.produtos, "Produto salvo");
            document.getElementById("productModal").style.display = "none";
            renderApp();
        };
        document.getElementById("cancelProductBtn").onclick = ()=> document.getElementById("productModal").style.display = "none";
    }
    function openClienteModal(cli){
        editingClienteId = cli?.id||null;
        document.getElementById("clienteNome").value = cli?.nome||"";
        document.getElementById("clienteTelefone").value = cli?.telefone||"";
        document.getElementById("clienteDocumento").value = cli?.documento||"";
        document.getElementById("clienteEndereco").value = cli?.endereco||"";
        document.getElementById("clienteObservacao").value = cli?.observacao||"";
        document.getElementById("clienteModal").style.display = "flex";
        document.getElementById("saveClienteBtn").onclick = async()=>{
            const nome = document.getElementById("clienteNome").value;
            if(!nome) return;
            const clienteData = { id: editingClienteId || Date.now().toString(), nome, telefone: document.getElementById("clienteTelefone").value, documento: document.getElementById("clienteDocumento").value, endereco: document.getElementById("clienteEndereco").value, observacao: document.getElementById("clienteObservacao").value };
            if(editingClienteId){
                const idx = localCache.clientes.findIndex(c=>c.id==editingClienteId);
                if(idx!==-1) localCache.clientes[idx] = clienteData;
            } else localCache.clientes.push(clienteData);
            await syncToGitHub("clientes", localCache.clientes, "Cliente salvo");
            document.getElementById("clienteModal").style.display = "none";
            renderApp();
        };
        document.getElementById("cancelClienteBtn").onclick = ()=> document.getElementById("clienteModal").style.display = "none";
    }
    function openUsuarioModal(user){
        editingUserId = user?.id||null;
        document.getElementById("usuarioNome").value = user?.nome||"";
        document.getElementById("usuarioLogin").value = user?.username||"";
        document.getElementById("usuarioSenha").value = "";
        document.getElementById("usuarioRole").value = user?.role||"seller";
        document.getElementById("usuarioModal").style.display = "flex";
        document.getElementById("saveUsuarioBtn").onclick = async()=>{
            const nome = document.getElementById("usuarioNome").value, login = document.getElementById("usuarioLogin").value, senha = document.getElementById("usuarioSenha").value, role = document.getElementById("usuarioRole").value;
            if(!nome || !login) return showPush("Nome/login obrigatório",true);
            if(!editingUserId && !senha) return showPush("Senha necessária",true);
            const userData = { id: editingUserId || Date.now().toString(), nome, username: login, password: senha || (editingUserId ? localCache.users.find(u=>u.id==editingUserId)?.password : ""), role };
            if(editingUserId){
                const idx = localCache.users.findIndex(u=>u.id==editingUserId);
                if(idx!==-1) localCache.users[idx] = userData;
            } else if(!localCache.users.find(u=>u.username===login)) localCache.users.push(userData);
            else return showPush("Login já existe",true);
            await syncToGitHub("users", localCache.users, "Usuário salvo");
            document.getElementById("usuarioModal").style.display = "none";
            renderApp();
        };
        document.getElementById("cancelUsuarioBtn").onclick = ()=> document.getElementById("usuarioModal").style.display = "none";
    }

    (async()=>{
        if(GITHUB_TOKEN === "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" && REPO_OWNER !== "SEU_USUARIO") {
            // token válido, mas precisa ajustar owner e repo
            alert("⚠️ Configure REPO_OWNER e REPO_NAME com os dados do seu repositório GitHub.");

        await syncFromGitHub();
        setInterval(async()=>{ if(currentUser) await syncFromGitHub(); }, 45000);
        renderApp();
    })();
    function iniciarRelogio(){ const r=document.getElementById("relogio"); setInterval(()=>{ if(r) r.textContent=new Date().toLocaleTimeString("pt-BR"); },1000); }
    iniciarRelogio();
    document.body.classList.toggle("dark-theme", localStorage.getItem("theme")==="dark");
