<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>3Rsystem Cloud · Gestão Compartilhada</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='0' fill='%232e7d32'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%23ffffff' font-family='Arial, sans-serif' font-weight='bold'%3E3R%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        /* ESTILOS (idênticos ao original) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        :root {
            --bg-body: #f2f5f7;
            --bg-app: #ffffff;
            --bg-header: #fafdfb;
            --border-color: #e9edf2;
            --text-primary: #1e3a2f;
            --text-secondary: #2a4236;
            --text-muted: #5e7a6b;
            --accent: #2e7d32;
            --accent-hover: #1b5e2a;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e0e8ed;
            --menu-hover: #eaf4ef;
            --menu-active: #e0f0e6;
            --card-bg: #ffffff;
            --card-border: #e3e9ef;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --input-border: #cad5d0;
            --table-header-border: #cbdcd2;
            --table-row-border: #e2ebe5;
        }

        body.dark-theme {
            --bg-body: #121212;
            --bg-app: #1e1e1e;
            --bg-header: #2a2a2a;
            --border-color: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --accent: #4caf7a;
            --accent-hover: #66bb8a;
            --sidebar-bg: #1e1e1e;
            --sidebar-border: #333333;
            --menu-hover: #2c2c2c;
            --menu-active: #2d7242;
            --card-bg: #2d2d2d;
            --card-border: #444444;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            --input-border: #555555;
            --table-header-border: #444444;
            --table-row-border: #444444;
        }

        body {
            background: var(--bg-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: background-color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            background: var(--bg-app);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .app-header {
            padding: 14px 24px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1.2rem;
        }
        .app-header i {
            color: var(--accent);
            font-size: 1.6rem;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 18px;
            align-items: center;
        }
        .user-header-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--menu-hover);
            padding: 6px 12px;
        }
        .user-header-area span {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
        }
        .logout-header-btn {
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
        }
        .logout-header-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        body.dark-theme .logout-header-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .layout {
            display: flex;
            flex: 1;
            min-height: 0;
            background: var(--bg-body);
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            transition: width 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed {
            width: 80px;
        }
        .sidebar-header {
            padding: 24px 16px 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .sidebar-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .toggle-btn {
            background: transparent;
            border: none;
            font-size: 1.3rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
        }
        .toggle-btn:hover {
            background: var(--menu-hover);
        }
        .menu {
            flex: 1;
            padding: 24px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            border-left: 3px solid transparent;
        }
        .menu-item i {
            font-size: 1.3rem;
            min-width: 24px;
            color: var(--accent);
        }
        .menu-item:hover {
            background: var(--menu-hover);
            border-left-color: var(--accent);
        }
        .menu-item.active {
            background: var(--menu-active);
            border-left-color: var(--accent-hover);
            color: var(--accent-hover);
        }
        .sidebar.collapsed .menu-item span {
            display: none;
        }
        .sidebar.collapsed .sidebar-header h3 {
            display: none;
        }

        .sidebar-footer {
            padding: 20px 16px;
            border-top: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-footer-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-footer-btn:hover {
            background: var(--menu-hover);
        }
        .sidebar.collapsed .theme-footer-btn span {
            display: none;
        }

        .content {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            background: var(--bg-body);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 28px;
            margin-bottom: 28px;
            box-shadow: 0 6px 14px rgba(0, 30, 10, 0.05);
        }

        h2, h3, h4 {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 20px;
        }
        h3 i {
            color: var(--accent);
            margin-right: 8px;
        }

        input, select, textarea, button {
            border: 1px solid var(--input-border);
            padding: 10px 16px;
            font-size: 0.9rem;
            background: var(--card-bg);
            color: var(--text-primary);
            outline: none;
        }
        textarea {
            resize: vertical;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }
        .btn {
            background: var(--card-bg);
            border: 1px solid var(--input-border);
            font-weight: 500;
            cursor: pointer;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent-hover);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 14px 8px;
            color: var(--text-primary);
            font-weight: 600;
            border-bottom: 2px solid var(--table-header-border);
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--table-row-border);
            color: var(--text-secondary);
            vertical-align: middle;
        }
        .product-photo {
            width: 40px;
            height: 40px;
            object-fit: cover;
            background: #f0f0f0;
            cursor: pointer;
        }
        .photos-stack {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .photos-stack img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .cart-table-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--card-border);
            margin-bottom: 20px;
        }
        .cart-table-container table {
            border-collapse: separate;
            border-spacing: 0;
        }
        .cart-table-container thead {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 5;
        }

        .push-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            color: #1e3a2f;
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-left: 4px solid var(--accent);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.2s ease;
            pointer-events: none;
        }
        body.dark-theme .push-notification {
            background: rgba(30,30,30,0.92);
            color: #e0e0e0;
        }
        .push-notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,20,0,0.4);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }
        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 32px;
            width: 520px;
            max-width: 90%;
            box-shadow: 0 30px 50px rgba(0,40,0,0.2);
        }

        .photo-upload-group {
            margin: 12px 0;
            padding: 8px;
            border: 1px solid var(--input-border);
        }
        .photo-preview-small {
            width: 64px;
            height: 64px;
            object-fit: cover;
            background: var(--menu-hover);
        }

        @media (max-width: 680px) {
            body { padding: 0; }
            .app-container { border: none; }
            .layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); }
            .sidebar.collapsed { width: 100%; }
            .content { padding: 20px; }
        }

        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            gap: 20px;
            backdrop-filter: blur(4px);
        }
        .lightbox img {
            max-width: 80vw;
            max-height: 80vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .file-modern {
            background: var(--menu-hover);
            padding: 8px 16px;
            font-size: 0.8rem;
        }
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .form-row > * {
            flex: 1;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="app-header">
        <i class="fas fa-store"></i>
        <span>3Rsystem Cloud</span>
        <div class="header-actions">
            <span id="relogio" style="font-size: 0.85rem;">--:--:--</span>
            <a href="https://consultadanfe.com/" target="_blank" style="text-decoration: none; display: flex; align-items: center; gap: 6px;"><i class="fas fa-file-invoice"></i> NF</a>
            <div id="userHeaderArea" style="display: none;" class="user-header-area">
                <i class="fas fa-user-circle"></i>
                <span id="headerUserName"></span>
            </div>
            <button id="logoutHeaderBtn" style="display: none;" class="logout-header-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </div>
    <div class="layout" id="layout"></div>
</div>

<!-- Modal Admin -->
<div id="adminModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h4 style="margin-bottom: 24px;">Autorização de administrador</h4>
        <input type="password" id="adminPassInput" placeholder="senha master" style="width: 100%; margin-bottom: 20px;">
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn" id="cancelAdminBtn">Cancelar</button>
            <button class="btn btn-primary" id="confirmAdminBtn">Confirmar</button>
        </div>
    </div>
</div>

<!-- Modal Produto -->
<div id="productModal" class="modal-overlay" style="display: none;">
    <div class="modal-card" style="width: 560px;">
        <h4 id="productModalTitle"><i class="fas fa-camera"></i> Produto (até 2 fotos)</h4>
        <input type="text" id="prodNome" placeholder="Nome do produto" style="width:100%; margin-bottom:12px;">
        <input type="number" id="prodPreco" placeholder="Preço R$" step="0.01" style="width:100%; margin-bottom:12px;">
        <input type="number" id="prodQtd" placeholder="Quantidade inicial" style="width:100%; margin-bottom:12px;">
        <input type="text" id="prodUnidade" placeholder="Unidade (un, kg, l)" style="width:100%; margin-bottom:12px;">
        <input type="number" id="prodMinima" placeholder="Estoque mínimo" style="width:100%; margin-bottom:12px;">
        <input type="text" id="prodCodigo" placeholder="Código (opcional)" style="width:100%; margin-bottom:12px;">
        <input type="text" id="prodCategoria" placeholder="Categoria" style="width:100%; margin-bottom:12px;">
        <div><label>📸 Fotos do produto (máx 2)</label></div>
        <div class="photo-upload-group" id="photoGroup1">
            <div style="display: flex; gap: 12px; align-items: center;">
                <img id="prodPhoto1Preview" class="photo-preview-small" src="" style="border:1px solid var(--border-color);">
                <button type="button" class="photo-upload-btn" data-photo-idx="0"><i class="fas fa-image"></i> Foto 1</button>
                <button type="button" class="clear-photo-btn" data-idx="0" style="background:transparent; border:none; color:var(--text-muted);"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>
        <div class="photo-upload-group" id="photoGroup2">
            <div style="display: flex; gap: 12px; align-items: center;">
                <img id="prodPhoto2Preview" class="photo-preview-small" src="" style="border:1px solid var(--border-color);">
                <button type="button" class="photo-upload-btn" data-photo-idx="1"><i class="fas fa-image"></i> Foto 2</button>
                <button type="button" class="clear-photo-btn" data-idx="1" style="background:transparent; border:none; color:var(--text-muted);"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>
        <input type="file" id="productPhotoFileTemp" accept="image/*" style="display: none;">
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
            <button class="btn" id="cancelProductBtn">Cancelar</button>
            <button class="btn btn-primary" id="saveProductBtn">Salvar</button>
        </div>
    </div>
</div>

<!-- Modal Cliente -->
<div id="clienteModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h4 id="clienteModalTitle"><i class="fas fa-user-plus"></i> Cliente</h4>
        <input type="text" id="clienteNome" placeholder="Nome *" style="width:100%; margin-bottom:12px;">
        <input type="text" id="clienteTelefone" placeholder="Telefone" style="width:100%; margin-bottom:12px;">
        <input type="text" id="clienteDocumento" placeholder="CPF/CNPJ" style="width:100%; margin-bottom:12px;">
        <textarea id="clienteEndereco" rows="2" placeholder="Endereço completo (rua, número, bairro, cidade)" style="width:100%; margin-bottom:12px;"></textarea>
        <textarea id="clienteObservacao" rows="2" placeholder="Observação (ex: preferências, limites de crédito...)" style="width:100%; margin-bottom:12px;"></textarea>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 12px;">
            <button class="btn" id="cancelClienteBtn">Cancelar</button>
            <button class="btn btn-primary" id="saveClienteBtn">Salvar</button>
        </div>
    </div>
</div>

<!-- Modal Usuário (Admin) -->
<div id="usuarioModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h4><i class="fas fa-users-cog"></i> Usuário</h4>
        <input type="text" id="usuarioNome" placeholder="Nome completo *" style="width:100%; margin-bottom:12px;">
        <input type="text" id="usuarioLogin" placeholder="Usuário (login) *" style="width:100%; margin-bottom:12px;">
        <input type="password" id="usuarioSenha" placeholder="Senha *" style="width:100%; margin-bottom:12px;">
        <select id="usuarioRole" style="width:100%; margin-bottom:20px;">
            <option value="seller">Vendedor</option>
            <option value="admin">Administrador</option>
        </select>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn" id="cancelUsuarioBtn">Cancelar</button>
            <button class="btn btn-primary" id="saveUsuarioBtn">Salvar</button>
        </div>
    </div>
</div>

<!-- Modal comprovante -->
<div id="comprovanteModal" class="modal-overlay" style="display: none;">
    <div class="modal-card" style="max-width: 500px; text-align: center;">
        <div id="comprovanteContent"></div>
        <div style="margin-top: 16px;">
            <button class="btn" id="fecharComprovanteBtn">Fechar</button>
            <a id="downloadComprovanteLink" class="btn btn-primary" download="comprovante" style="display: inline-flex; text-decoration: none;">Baixar arquivo</a>
        </div>
    </div>
</div>

<div class="push-notification" id="pushNotification"></div>

<script>
    // ==================== CONFIGURAÇÃO DO FIREBASE ====================
    // SUBSTITUA PELOS DADOS DO SEU PROJETO FIREBASE
    const firebaseConfig = {
  apiKey: "AIzaSyBulw2flcwG-lW1NrDjLMZqg4-MIbjuz2c",
  authDomain: "sistema-de-vendas-f5e13.firebaseapp.com",
  projectId: "sistema-de-vendas-f5e13",
  storageBucket: "sistema-de-vendas-f5e13.firebasestorage.app",
  messagingSenderId: "507999134319",
  appId: "1:507999134319:web:8cc1870754701ee567e39a",
  measurementId: "G-ZLGBC8SCCJ"
    };
    // ================================================================

    // Inicializa Firebase
    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log("✅ Firebase inicializado com sucesso.");
    } catch (e) {
        console.error("❌ Erro ao inicializar Firebase:", e);
        alert("Erro de configuração do Firebase. Verifique as credenciais e a conexão.");
    }

    // Helper para logs no Firestore
    async function addLog(acao, detalhes) {
        if (!currentUser || !db) return;
        try {
            await db.collection('logs').add({
                data: new Date().toLocaleString('pt-BR'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                usuario: currentUser.nome,
                acao,
                detalhes
            });
            // Limpar logs antigos (mantém últimos 1000)
            const logsSnap = await db.collection('logs').orderBy('timestamp', 'desc').limit(1000).get();
            const keepIds = logsSnap.docs.map(d => d.id);
            const allLogs = await db.collection('logs').get();
            allLogs.docs.forEach(doc => {
                if (!keepIds.includes(doc.id)) doc.ref.delete();
            });
        } catch (e) {
            console.warn("Erro ao adicionar log:", e);
        }
    }

    // Inicializar dados padrão (somente se a coleção estiver vazia)
    async function inicializarDados() {
        if (!db) return;
        try {
            const usersSnap = await db.collection('users').get();
            if (usersSnap.empty) {
                const defaultUsers = [
                    { id: "1", username: 'admin', password: 'Pedro@2017', role: 'admin', nome: 'Admin Master' },
                    { id: "2", username: 'vendedor', password: '1234', role: 'seller', nome: 'Vendedor' }
                ];
                for (const u of defaultUsers) {
                    await db.collection('users').doc(u.id).set(u);
                }
                console.log("✅ Usuários padrão criados.");
            }
            const configSnap = await db.collection('config').doc('recibo').get();
            if (!configSnap.exists) {
                await db.collection('config').doc('recibo').set({ estilo: 'moderno' });
                console.log("✅ Configuração padrão criada.");
            }
            await addLog('Sistema iniciado', 'Banco de dados em nuvem ativado');
        } catch (e) {
            console.error("Erro ao inicializar dados:", e);
        }
    }

    let currentUser = null;
    let currentSection = 'vendas';
    let sidebarExpanded = true;
    let carrinho = [];
    let clienteSelecionado = null;
    let metodoPagamentoSelecionado = null;
    let editingProductId = null;
    let currentPixFileBase64 = null, currentPixFileName = '';
    let editingUserId = null;
    let editingClienteId = null;
    let tempPhotos = ['', ''];

    const pushNotif = document.getElementById('pushNotification');
    const adminModal = document.getElementById('adminModal');
    const productModal = document.getElementById('productModal');
    const clienteModal = document.getElementById('clienteModal');
    const usuarioModal = document.getElementById('usuarioModal');

    function showPush(msg, isError = false) {
        pushNotif.textContent = msg;
        pushNotif.classList.add('show');
        if (isError) pushNotif.style.borderLeftColor = "#d32f2f";
        else pushNotif.style.borderLeftColor = "var(--accent)";
        setTimeout(() => {
            pushNotif.classList.remove('show');
            pushNotif.style.borderLeftColor = "var(--accent)";
        }, 2800);
        console.log(msg);
    }

    function applyTheme(theme) { document.body.classList.toggle('dark-theme', theme === 'dark'); }
    let currentTheme = localStorage.getItem('theme') || 'light';
    applyTheme(currentTheme);
    function iniciarRelogio() { const relogioEl = document.getElementById('relogio'); if(!relogioEl) return; function tick() { const agora = new Date(); relogioEl.textContent = agora.toLocaleTimeString('pt-BR'); } tick(); setInterval(tick, 1000); }
    iniciarRelogio();

    function solicitarSenhaAdmin(callback) {
        const input = document.getElementById('adminPassInput'); input.value = '';
        adminModal.style.display = 'flex';
        const onConfirm = async () => {
            const senha = input.value;
            try {
                const usersSnap = await db.collection('users').where('role', '==', 'admin').get();
                let ok = false;
                usersSnap.forEach(doc => { if(doc.data().password === senha) ok = true; });
                adminModal.style.display = 'none';
                callback(ok);
                if (!ok) showPush('❌ Acesso negado', true);
            } catch(e) {
                adminModal.style.display = 'none';
                callback(false);
                showPush("Erro ao verificar senha: " + e.message, true);
            }
            cleanup();
        };
        const onCancel = () => { adminModal.style.display = 'none'; callback(false); cleanup(); };
        const cleanup = () => {
            document.getElementById('confirmAdminBtn').removeEventListener('click', onConfirm);
            document.getElementById('cancelAdminBtn').removeEventListener('click', onCancel);
        };
        document.getElementById('confirmAdminBtn').addEventListener('click', onConfirm);
        document.getElementById('cancelAdminBtn').addEventListener('click', onCancel);
    }

    async function atualizarEstoque(itensVendidos) {
        for (const item of itensVendidos) {
            if (item.id) {
                try {
                    const docRef = db.collection('produtos').doc(item.id.toString());
                    const docSnap = await docRef.get();
                    if (docSnap.exists) {
                        const prod = docSnap.data();
                        const novaQtd = (prod.qtdAtual || 0) - item.qtd;
                        await docRef.update({ qtdAtual: novaQtd });
                    }
                } catch(e) {
                    console.error("Erro ao atualizar estoque:", e);
                    throw e;
                }
            }
        }
    }

    function gerarRecibo(venda, estilo) {
        const win = window.open('', '_blank', 'width=500,height=700');
        let html = '';
        const comprovanteHtml = venda.comprovanteBase64 ? `<p><strong>Comprovante PIX:</strong> <a href="${venda.comprovanteBase64}" download="${venda.comprovanteNome || 'comprovante'}" style="color:var(--accent);">Baixar arquivo</a></p>` : '';
        if (estilo === 'termico') {
            html = `<pre style="font-family: monospace;">================================\n          3Rsystem\n================================\nData: ${venda.data}\nCliente: ${venda.cliente}\n--------------------------------\n${venda.itens.map(i => `${i.nome} ${i.qtd}x R$ ${(i.preco*i.qtd).toFixed(2)}`).join('\n')}\n--------------------------------\nTOTAL: R$ ${venda.total.toFixed(2)}\nPagamento: ${venda.pagamento}\nObservação: ${venda.observacao || '---'}\n================================\n        Obrigado!\n================================</pre>`;
        } else {
            html = `<html><head><meta charset="UTF-8"><title>Recibo</title><style>body{font-family:Inter,sans-serif;padding:30px;} .recibo{max-width:400px;margin:auto;border:1px solid #ccc;padding:20px;}</style></head><body><div class="recibo"><h2>3Rsystem</h2><p><strong>Data:</strong> ${venda.data}</p><p><strong>Cliente:</strong> ${venda.cliente}</p><p><strong>Observação:</strong> ${venda.observacao || '-'}</p><table width="100%"><thead><tr><th>Item</th><th>Qtd</th><th>Subtotal</th></tr></thead><tbody>${venda.itens.map(i => `<tr><td>${i.nome}</td><td>${i.qtd}</td><td>R$ ${(i.preco*i.qtd).toFixed(2)}</td></tr>`).join('')}</tbody></table><h3>Total: R$ ${venda.total.toFixed(2)}</h3><p>Pagamento: ${venda.pagamento}</p>${comprovanteHtml}<small>Documento sem valor fiscal</small></div></body></html>`;
        }
        win.document.write(html);
        win.document.close();
        win.print();
    }

        const isAdmin = currentUser.role === 'admin';

        const sidebarHtml = `<div class="sidebar ${sidebarExpanded ? '' : 'collapsed'}" id="sidebar"><div class="sidebar-header"><h3>MENU</h3><button class="toggle-btn" id="toggleSidebar"><i class="fas fa-${sidebarExpanded ? 'angle-left' : 'angle-right'}"></i></button></div><div class="menu">${menuItems}</div><div class="sidebar-footer"><button class="theme-footer-btn" id="themeFooterBtn"><i class="fas ${currentTheme === 'dark' ? 'fa-moon' : 'fa-sun'}"></i><span>Tema</span></button></div></div><div class="content" id="contentArea"></div>`;

        const themeBtn = document.getElementById('themeFooterBtn'); if(themeBtn) themeBtn.addEventListener('click', () => { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; localStorage.setItem('theme', currentTheme); applyTheme(currentTheme); const icon = themeBtn.querySelector('i'); icon.className = currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun'; });

    async function renderContent() {
        const area = document.getElementById('contentArea');
        if (!area) return;

        else if (currentSection === 'produtos') area.innerHTML = await renderProdutos();
        else if (currentSection === 'clientes') area.innerHTML = await renderClientes();
        else if (currentSection === 'relatorios') area.innerHTML = await renderRelatorios();
        else if (currentSection === 'config') area.innerHTML = renderConfig();

        else if (currentSection === 'logs') area.innerHTML = await renderLogs();

    // VENDAS
    async function renderVendas() {
        const produtosSnap = await db.collection('produtos').where('ativo', '==', true).get();
        const produtos = produtosSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const clientesSnap = await db.collection('clientes').get();
        const clientes = clientesSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        let clienteOptions = '<option value="">Cliente avulso</option>';
        clientes.forEach(c => clienteOptions += `<option value="${c.id}">${c.nome}</option>`);
        let totalCarrinho = 0, linhasCarrinho = '';
        carrinho.forEach((item, idx) => { const subtotal = item.preco * item.qtd; totalCarrinho += subtotal; linhasCarrinho += `<tr><td>${item.nome}</td><td>R$ ${item.preco.toFixed(2)}</td><td>${item.qtd}</td><td>R$ ${subtotal.toFixed(2)}</td><td><button class="btn remove-item" data-index="${idx}"><i class="fas fa-trash-alt"></i></button></td></tr>`; });
        return `<div class="card"><h3><i class="fas fa-shopping-cart"></i> Registrar venda</h3><div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;margin-bottom:24px;"><div><label>Buscar produto</label><div style="display:flex;gap:8px;"><input type="text" id="buscaProduto" placeholder="Nome ou código" list="prodList"><datalist id="prodList">${produtos.map(p => `<option value="${p.nome}">`).join('')}</datalist><button class="btn btn-primary" id="addProdutoBtn"><i class="fas fa-plus"></i> Adicionar</button></div><div style="margin-top:16px;"><label>Cliente</label><select id="selectCliente">${clienteOptions}</select></div></div><div style="background:var(--card-bg);padding:18px;"><h4>Resumo</h4><p style="font-size:1.8rem;font-weight:500;color:var(--accent);">R$ ${totalCarrinho.toFixed(2)}</p></div></div><div class="cart-table-container"><table><thead><tr><th>Item</th><th>Preço</th><th>Qtd</th><th>Subtotal</th><th></th></tr></thead><tbody>${linhasCarrinho || '<tr><td colspan="5" style="text-align:center;">Carrinho vazio</td></tr>'}</tbody></table></div><div><textarea id="observacaoVenda" rows="2" placeholder="Observação da venda (opcional)"></textarea></div><div><button class="btn" id="aplicarDescontoBtn"><i class="fas fa-tag"></i> Desconto (admin)</button></div><div><h4>Pagamento</h4><div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="btn metodo-pagamento" data-metodo="dinheiro">Dinheiro</button><button class="btn metodo-pagamento" data-metodo="debito">Débito</button><button class="btn metodo-pagamento" data-metodo="pix">PIX</button><button class="btn metodo-pagamento" data-metodo="credito">Crédito</button></div><div id="detalhePagamento"></div><div id="pixComprovanteArea" style="display:none;"><label>📎 Comprovante (PDF/imagem) *</label><input type="file" id="pixComprovanteFile" accept=".pdf,image/*"><div id="pixPreview"><span id="pixFileName"></span></div></div><button class="btn btn-primary" id="finalizarVendaBtn">Finalizar venda e emitir recibo</button></div></div>`;
    }

    async function attachVendasEvents() {
        document.getElementById('addProdutoBtn')?.addEventListener('click', async () => {
            const busca = document.getElementById('buscaProduto').value;
            if (!busca) { showPush("Digite o nome do produto", true); return; }
            try {
                const produtosSnap = await db.collection('produtos').where('ativo', '==', true).get();
                const produtos = produtosSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const prod = produtos.find(p => p.nome.toLowerCase() === busca.toLowerCase() || (p.codigo && p.codigo === busca));
                if (!prod) { showPush('Produto não encontrado', true); return; }
                let qtd = parseFloat(prompt('Quantidade:', '1')) || 1;
                if (prod.qtdAtual < qtd) { showPush('❌ Estoque insuficiente', true); return; }
                carrinho.push({ id: prod.id, nome: prod.nome, preco: prod.preco, qtd });
                showPush('Item adicionado');
                renderApp();
            } catch(e) { showPush("Erro: " + e.message, true); }
        });
        document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', (e) => {
            const idx = e.currentTarget.dataset.index;
            solicitarSenhaAdmin(ok => { if (ok) { carrinho.splice(idx,1); showPush('Item removido'); renderApp(); } });
        }));
        document.getElementById('aplicarDescontoBtn')?.addEventListener('click', () => {
            solicitarSenhaAdmin(ok => {
                if(!ok) return;
                const percent = parseFloat(prompt('Percentual desconto (%):','0'));
                if(isNaN(percent) || percent<=0) return;
                const total = carrinho.reduce((a,i)=> a+(i.preco*i.qtd),0);
                carrinho.push({ id:null, nome:'** DESCONTO **', preco: -total*(percent/100), qtd:1 });
                showPush(`Desconto ${percent}% aplicado`);
                renderApp();
            });
        });
        let pixArea = document.getElementById('pixComprovanteArea');
        document.querySelectorAll('.metodo-pagamento').forEach(btn => btn.addEventListener('click', (e) => {
            metodoPagamentoSelecionado = e.currentTarget.dataset.metodo;
            const div = document.getElementById('detalhePagamento');
            if(metodoPagamentoSelecionado === 'dinheiro') div.innerHTML = `<input type="number" id="valorRecebido" placeholder="Valor recebido"><p id="trocoDisplay"></p>`;
            else if(metodoPagamentoSelecionado === 'credito') div.innerHTML = `<select id="parcelasSelect">${Array.from({length:24},(_,i)=>`<option value="${i+1}">${i+1}x</option>`).join('')}</select><input type="text" id="comprovanteCredito" placeholder="Comprovante">`;
            else div.innerHTML = `<input type="text" id="comprovante" placeholder="Comprovante (opcional)">`;
            if(metodoPagamentoSelecionado === 'pix') { if(pixArea) pixArea.style.display = 'block'; } else { if(pixArea) pixArea.style.display = 'none'; currentPixFileBase64 = null; currentPixFileName = ''; document.getElementById('pixFileName').innerHTML = ''; }
        }));
        document.getElementById('pixComprovanteFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { currentPixFileBase64 = ev.target.result; currentPixFileName = file.name; document.getElementById('pixFileName').innerHTML = `✅ ${file.name}`; };
                reader.readAsDataURL(file);
            } else { currentPixFileBase64 = null; currentPixFileName = ''; document.getElementById('pixFileName').innerHTML = ''; }
        });
        document.getElementById('finalizarVendaBtn')?.addEventListener('click', async () => {
            if(!carrinho.length) { showPush('Carrinho vazio', true); return; }
            if(!metodoPagamentoSelecionado) { showPush('Selecione pagamento', true); return; }
            if(metodoPagamentoSelecionado === 'pix' && !currentPixFileBase64) { showPush('Para PIX é obrigatório anexar comprovante', true); return; }
            let total = carrinho.reduce((a,i)=> a+(i.preco*i.qtd),0);
            let pagamentoInfo = '';
            if(metodoPagamentoSelecionado === 'dinheiro'){
                let recebido = parseFloat(document.getElementById('valorRecebido')?.value);
                if(isNaN(recebido)){ showPush('Valor recebido inválido', true); return; }
                pagamentoInfo = `Dinheiro: R$ ${recebido.toFixed(2)} | Troco: R$ ${(recebido-total).toFixed(2)}`;
            } else if(metodoPagamentoSelecionado === 'credito'){
                let parcelas = document.getElementById('parcelasSelect')?.value;
                pagamentoInfo = `Crédito ${parcelas}x | Comp: ${document.getElementById('comprovanteCredito')?.value || '---'}`;
            } else if(metodoPagamentoSelecionado === 'pix'){
                pagamentoInfo = `PIX | ${document.getElementById('comprovante')?.value || ''}`;
            } else {
                pagamentoInfo = `${metodoPagamentoSelecionado.toUpperCase()} | ${document.getElementById('comprovante')?.value || '---'}`;
            }
            let observacao = document.getElementById('observacaoVenda')?.value || '';
            try {
                await atualizarEstoque(carrinho);
                const novaVenda = {
                    id: Date.now().toString(),
                    data: new Date().toLocaleString('pt-BR'),
                    dataISO: new Date().toISOString(),
                    itens: [...carrinho],
                    total,
                    cliente: clienteSelecionado ? clienteSelecionado.nome : 'Avulso',
                    pagamento: pagamentoInfo,
                    observacao: observacao,
                    comprovanteBase64: (metodoPagamentoSelecionado === 'pix') ? currentPixFileBase64 : null,
                    comprovanteNome: (metodoPagamentoSelecionado === 'pix') ? currentPixFileName : null
                };
                await db.collection('vendas').doc(novaVenda.id).set(novaVenda);
                await addLog('Venda finalizada', `Valor R$ ${total.toFixed(2)} - ${pagamentoInfo}`);
                const configSnap = await db.collection('config').doc('recibo').get();
                const config = configSnap.data() || { estilo: 'moderno' };
                gerarRecibo(novaVenda, config.estilo);
                carrinho = [];
                metodoPagamentoSelecionado = null;
                currentPixFileBase64 = null;
                currentPixFileName = '';
                showPush('✅ Venda finalizada');
                renderApp();
            } catch(e) {
                showPush("Erro ao finalizar venda: " + e.message, true);
            }
        });
        document.getElementById('selectCliente')?.addEventListener('change', async (e) => {
            const id = e.target.value;
            if(!id) { clienteSelecionado = null; return; }
            try {
                const docSnap = await db.collection('clientes').doc(id).get();
                if(docSnap.exists) clienteSelecionado = { id: docSnap.id, ...docSnap.data() };
                else clienteSelecionado = null;
            } catch(e) { console.error(e); }
        });
    }

    // PRODUTOS
    async function renderProdutos() {
        const snapshot = await db.collection('produtos').get();
        const prods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        let html = `<div class="card"><h3><i class="fas fa-cubes"></i> Estoque</h3><button class="btn btn-primary" id="novoProdutoBtn"><i class="fas fa-plus"></i> Novo produto</button><table><thead><tr><th>Fotos</th><th>Código</th><th>Nome</th><th>Categoria</th><th>Qtd atual</th><th>Preço</th><th>Ações</th></tr></thead><tbody>`;
        prods.forEach(p => {
            let photosHtml = `<div class="photos-stack">`;
            if(p.photos && p.photos.length) p.photos.slice(0,2).forEach(ph => { if(ph) photosHtml += `<img src="${ph}" class="product-photo" data-photos='${JSON.stringify(p.photos.filter(f=>f))}' data-full="true">`; });
            else photosHtml += `<i class="fas fa-camera" style="font-size:28px;"></i>`;
            photosHtml += `</div>`;
            html += `<tr><td>${photosHtml}</td><td>${p.codigo || '-'}</td><td>${p.nome}</td><td>${p.categoria || '-'}</td><td>${p.qtdAtual !== undefined ? p.qtdAtual : (p.qtdInicial||0)} ${p.unidade||'un'}</td><td>R$ ${p.preco}</td><td><button class="btn editarProduto" data-id="${p.id}"><i class="fas fa-edit"></i></button> <button class="btn excluirProduto" data-id="${p.id}"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        html += `</tbody></table></div>`;
        return html;
    }

    function openLightbox(photosArray) { if(!photosArray?.length) return; const lb = document.createElement('div'); lb.className = 'lightbox'; lb.innerHTML = `<div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">${photosArray.map(src => `<img src="${src}">`).join('')}</div><button style="position:absolute; top:20px; right:30px; background:white; border:none; font-size:30px; cursor:pointer;">&times;</button>`; lb.onclick = (e) => { if(e.target === lb || e.target.tagName === 'BUTTON') lb.remove(); }; document.body.appendChild(lb); }

    async function attachProdutosEvents() {
        document.getElementById('novoProdutoBtn')?.addEventListener('click', () => openProductModal(null));
        document.querySelectorAll('.editarProduto').forEach(btn => btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.dataset.id;
            const docSnap = await db.collection('produtos').doc(id).get();
            if(docSnap.exists) openProductModal({ id: docSnap.id, ...docSnap.data() });
        }));
        document.querySelectorAll('.excluirProduto').forEach(btn => btn.addEventListener('click', async (e) => {
            if(!confirm('Excluir produto?')) return;

    function openProductModal(prod = null) {
        editingProductId = prod ? prod.id : null;
        document.getElementById('prodNome').value = prod ? prod.nome : '';
        document.getElementById('prodPreco').value = prod ? prod.preco : '';
        document.getElementById('prodQtd').value = prod ? (prod.qtdAtual !== undefined ? prod.qtdAtual : (prod.qtdInicial||0)) : 0;
        document.getElementById('prodUnidade').value = prod ? (prod.unidade || 'un') : 'un';
        document.getElementById('prodMinima').value = prod ? (prod.qtdMinima || 0) : 0;
        document.getElementById('prodCodigo').value = prod ? (prod.codigo || '') : '';
        document.getElementById('prodCategoria').value = prod ? (prod.categoria || '') : '';
        let photos = (prod && prod.photos) ? prod.photos : [];
        tempPhotos = [photos[0] || '', photos[1] || ''];
        document.getElementById('prodPhoto1Preview').src = tempPhotos[0] || '';
        document.getElementById('prodPhoto2Preview').src = tempPhotos[1] || '';
        productModal.style.display = 'flex';

    function setupPhotoUpload(idx) {
        const fileInput = document.getElementById('productPhotoFileTemp');
        if(!fileInput) return;
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    tempPhotos[idx] = ev.target.result;
                    if(idx===0) document.getElementById('prodPhoto1Preview').src = ev.target.result;
                    else document.getElementById('prodPhoto2Preview').src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
            fileInput.value = '';
        };
        const btns = document.querySelectorAll('.photo-upload-btn');
        btns.forEach(btn => {
            btn.removeEventListener('click', btn._listener);
            btn._listener = () => { const photoIdx = parseInt(btn.dataset.photoIdx); if(photoIdx===idx) fileInput.click(); };
            btn.addEventListener('click', btn._listener);
        });
        document.querySelectorAll('.clear-photo-btn').forEach(clear => {
            clear.removeEventListener('click', clear._listener);
            clear._listener = () => { const clearIdx = parseInt(clear.dataset.idx); if(clearIdx===idx) { tempPhotos[clearIdx] = ''; if(clearIdx===0) document.getElementById('prodPhoto1Preview').src = ''; else document.getElementById('prodPhoto2Preview').src = ''; } };
            clear.addEventListener('click', clear._listener);
        });
    }

    document.getElementById('saveProductBtn')?.addEventListener('click', async () => {
        const nome = document.getElementById('prodNome').value.trim();
        if(!nome) { showPush('Nome obrigatório', true); return; }
        const preco = parseFloat(document.getElementById('prodPreco').value);
        const qtd = parseFloat(document.getElementById('prodQtd').value);
        const unidade = document.getElementById('prodUnidade').value;
        const minima = parseFloat(document.getElementById('prodMinima').value);
        const codigo = document.getElementById('prodCodigo').value;
        const categoria = document.getElementById('prodCategoria').value;
        const finalPhotos = tempPhotos.filter(p => p && p.trim() !== '');
        const prodData = { nome, preco, qtdAtual: qtd, qtdInicial: qtd, unidade, qtdMinima: minima, codigo, categoria, ativo: true, photos: finalPhotos };
        try {
            if(editingProductId) {
                await db.collection('produtos').doc(editingProductId).update(prodData);
                await addLog('Produto editado', `${nome} (ID ${editingProductId})`);
                showPush('Produto atualizado');
            } else {
                const newId = Date.now().toString();
                await db.collection('produtos').doc(newId).set({ ...prodData, id: newId });
                await addLog('Produto criado', `${nome}`);
                showPush('Produto adicionado');
            }
            productModal.style.display = 'none';
            renderApp();
        } catch(e) {
            showPush("Erro ao salvar produto: " + e.message, true);
        }
    });
    document.getElementById('cancelProductBtn')?.addEventListener('click', () => productModal.style.display = 'none');
    setupPhotoUpload(0);
    setupPhotoUpload(1);

    // CLIENTES
    async function renderClientes() {
        const snapshot = await db.collection('clientes').get();
        const clientes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        let html = `<div class="card"><h3><i class="fas fa-address-card"></i> Clientes</h3><button class="btn btn-primary" id="novoClienteBtn"><i class="fas fa-user-plus"></i> Novo cliente</button><table><thead><tr><th>Nome</th><th>Telefone</th><th>Documento</th><th>Endereço</th><th>Observação</th><th>Ações</th></tr></thead><tbody>`;
        clientes.forEach(c => { html += `<tr><td>${c.nome}</td><td>${c.telefone||'-'}</td><td>${c.documento||'-'}</td><td>${c.endereco||'-'}</td><td>${c.observacao||'-'}</td><td><button class="btn editarCliente" data-id="${c.id}"><i class="fas fa-edit"></i></button> <button class="btn excluirCliente" data-id="${c.id}"><i class="fas fa-trash"></i></button></td></tr>`; });
        html += `</tbody></table></div>`;
        return html;
    }
    function openClienteModal(cliente = null) {
        editingClienteId = cliente ? cliente.id : null;
        document.getElementById('clienteNome').value = cliente ? cliente.nome : '';
        document.getElementById('clienteTelefone').value = cliente ? (cliente.telefone || '') : '';
        document.getElementById('clienteDocumento').value = cliente ? (cliente.documento || '') : '';
        document.getElementById('clienteEndereco').value = cliente ? (cliente.endereco || '') : '';
        document.getElementById('clienteObservacao').value = cliente ? (cliente.observacao || '') : '';
        clienteModal.style.display = 'flex';
    }
    async function attachClientesEvents() {
        document.getElementById('novoClienteBtn')?.addEventListener('click', () => openClienteModal(null));
        document.querySelectorAll('.editarCliente').forEach(btn => btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.dataset.id;
            const docSnap = await db.collection('clientes').doc(id).get();
            if(docSnap.exists) openClienteModal({ id: docSnap.id, ...docSnap.data() });
        }));
        document.querySelectorAll('.excluirCliente').forEach(btn => btn.addEventListener('click', async (e) => {
            if(!confirm('Excluir cliente?')) return;
            const id = e.currentTarget.dataset.id;
            await db.collection('clientes').doc(id).delete();
            await addLog('Cliente excluído', `ID ${id}`);
            showPush('Cliente removido');
            renderApp();
        }));
        document.getElementById('saveClienteBtn')?.addEventListener('click', async () => {
            const nome = document.getElementById('clienteNome').value.trim();
            if(!nome) { showPush('Nome obrigatório', true); return; }
            const telefone = document.getElementById('clienteTelefone').value;
            const documento = document.getElementById('clienteDocumento').value;
            const endereco = document.getElementById('clienteEndereco').value;
            const observacao = document.getElementById('clienteObservacao').value;
            const clienteData = { nome, telefone, documento, endereco, observacao };
            try {
                if(editingClienteId) {
                    await db.collection('clientes').doc(editingClienteId).update(clienteData);
                    await addLog('Cliente editado', `${nome}`);
                    showPush('Cliente atualizado');
                } else {
                    const newId = Date.now().toString();
                    await db.collection('clientes').doc(newId).set({ ...clienteData, id: newId });
                    await addLog('Cliente criado', `${nome}`);
                    showPush('Cliente cadastrado');
                }
                clienteModal.style.display = 'none';
                renderApp();
            } catch(e) {
                showPush("Erro ao salvar cliente: " + e.message, true);
            }
        });
        document.getElementById('cancelClienteBtn')?.addEventListener('click', () => clienteModal.style.display = 'none');
    }

    // RELATÓRIOS
    async function renderRelatorios() { return `<div class="card"><h3>Relatório de vendas</h3><div><input type="date" id="relDataInicio"><input type="date" id="relDataFim"><button class="btn btn-primary" id="filtrarRelBtn">Filtrar</button></div><div id="relatorioResultado"></div></div>`; }
    async function attachRelatoriosEvents() {
        async function filtrar() {
            try {
                let vendasSnap = await db.collection('vendas').get();
                let vendas = vendasSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const inicio = document.getElementById('relDataInicio')?.value, fim = document.getElementById('relDataFim')?.value;
                if(inicio || fim) vendas = vendas.filter(v => { let data = new Date(v.dataISO || v.data.split('/').reverse().join('-')); if(inicio && data < new Date(inicio)) return false; if(fim && data > new Date(fim)) return false; return true; });
                let total = vendas.reduce((s,v)=> s+v.total,0);
                let linhas = vendas.map((v, idx) => `<tr><td>${v.data}</td><td>${v.cliente}</td><td>R$ ${v.total.toFixed(2)}</td><td>${v.pagamento}</td><td>${v.observacao||'-'}</td><td>${v.comprovanteBase64 ? `<button class="btn verComprovanteBtn" data-idx="${idx}">Ver</button>` : '-'}</td></tr>`).join('');
                document.getElementById('relatorioResultado').innerHTML = `<p><strong>${vendas.length}</strong> vendas - Total: R$ ${total.toFixed(2)}</p><table><thead><tr><th>Data</th><th>Cliente</th><th>Total</th><th>Pagamento</th><th>Observação</th><th>Comprovante</th></tr></thead><tbody>${linhas||'<tr><td colspan="6">Nenhuma venda</td></tr>'}</tbody></table>`;
                document.querySelectorAll('.verComprovanteBtn').forEach(btn => btn.addEventListener('click', () => { const idx = parseInt(btn.dataset.idx); const venda = vendas[idx]; if(venda?.comprovanteBase64) { document.getElementById('comprovanteContent').innerHTML = `<iframe src="${venda.comprovanteBase64}" style="width:100%; height:400px;"></iframe>`; document.getElementById('downloadComprovanteLink').href = venda.comprovanteBase64; document.getElementById('downloadComprovanteLink').download = venda.comprovanteNome || 'comprovante'; document.getElementById('comprovanteModal').style.display = 'flex'; } }));
            } catch(e) { showPush("Erro ao carregar relatório: " + e.message, true); }
        }
        document.getElementById('filtrarRelBtn')?.addEventListener('click', filtrar);
        setTimeout(filtrar, 50);
        document.getElementById('fecharComprovanteBtn')?.addEventListener('click', () => document.getElementById('comprovanteModal').style.display = 'none');
    }

    // USUÁRIOS
    async function renderUsuarios() {
        const snapshot = await db.collection('users').get();
        const usuarios = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        let html = `<div class="card"><h3><i class="fas fa-users-cog"></i> Gerenciar usuários</h3><button class="btn btn-primary" id="novoUsuarioBtn"><i class="fas fa-user-plus"></i> Novo usuário</button><table><thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Ações</th></tr></thead><tbody>`;
        usuarios.forEach(u => { html += `<tr><td>${u.nome}</td><td>${u.username}</td><td>${u.role === 'admin' ? 'Administrador' : 'Vendedor'}</td><td><button class="btn editarUsuario" data-id="${u.id}"><i class="fas fa-edit"></i></button> ${u.id !== currentUser.id ? `<button class="btn excluirUsuario" data-id="${u.id}"><i class="fas fa-trash"></i></button>` : ''}</td></tr>`; });
        html += `</tbody></table></div>`;
        return html;
    }
    function openUsuarioModal(usuario = null) {
        editingUserId = usuario ? usuario.id : null;
        document.getElementById('usuarioNome').value = usuario ? usuario.nome : '';
        document.getElementById('usuarioLogin').value = usuario ? usuario.username : '';
        document.getElementById('usuarioSenha').value = '';
        document.getElementById('usuarioRole').value = usuario ? usuario.role : 'seller';
        usuarioModal.style.display = 'flex';
    }
    async function attachUsuariosEvents() {
        document.getElementById('novoUsuarioBtn')?.addEventListener('click', () => openUsuarioModal(null));
        document.querySelectorAll('.editarUsuario').forEach(btn => btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.dataset.id;
            const docSnap = await db.collection('users').doc(id).get();
            if(docSnap.exists) openUsuarioModal({ id: docSnap.id, ...docSnap.data() });
        }));
        document.querySelectorAll('.excluirUsuario').forEach(btn => btn.addEventListener('click', async (e) => {
            if(!confirm('Excluir usuário?')) return;
            const id = e.currentTarget.dataset.id;
            await db.collection('users').doc(id).delete();
            await addLog('Usuário excluído', `ID ${id}`);
            showPush('Usuário removido');
            renderApp();
        }));
        document.getElementById('saveUsuarioBtn')?.addEventListener('click', async () => {
            const nome = document.getElementById('usuarioNome').value.trim();
            const login = document.getElementById('usuarioLogin').value.trim();
            const senha = document.getElementById('usuarioSenha').value;
            const role = document.getElementById('usuarioRole').value;
            if(!nome || !login) { showPush('Nome e login obrigatórios', true); return; }
            if(!editingUserId && !senha) { showPush('Senha obrigatória', true); return; }
            try {
                if(editingUserId) {
                    const updateData = { nome, username: login, role };
                    if(senha) updateData.password = senha;
                    await db.collection('users').doc(editingUserId).update(updateData);
                    await addLog('Usuário editado', `${nome}`);
                    showPush('Usuário atualizado');
                } else {
                    const usersSnap = await db.collection('users').where('username', '==', login).get();
                    if(!usersSnap.empty) { showPush('Login já existe', true); return; }
                    const newId = Date.now().toString();
                    await db.collection('users').doc(newId).set({ id: newId, username: login, password: senha, role, nome });
                    await addLog('Usuário criado', `${nome} (${login})`);
                    showPush('Usuário criado');
                }
                usuarioModal.style.display = 'none';
                renderApp();
            } catch(e) {
                showPush("Erro ao salvar usuário: " + e.message, true);
            }
        });
        document.getElementById('cancelUsuarioBtn')?.addEventListener('click', () => usuarioModal.style.display = 'none');
    }

    // LOGS
    async function renderLogs() {
        const snapshot = await db.collection('logs').orderBy('timestamp', 'desc').limit(1000).get();
        const logs = snapshot.docs.map(doc => doc.data());
        let linhas = logs.map(l => `<tr><td>${l.data}</td><td>${l.usuario}</td><td>${l.acao}</td><td>${l.detalhes}</td></tr>`).join('');
        return `<div class="card"><h3><i class="fas fa-history"></i> Log de alterações e vendas</h3><div style="max-height: 60vh; overflow-y: auto;"><table><thead><tr><th>Data/Hora</th><th>Usuário</th><th>Ação</th><th>Detalhes</th></tr></thead><tbody>${linhas || '<tr><td colspan="4">Nenhum registro</td></tr>'}</tbody></table></div></div>`;
    }

    // CONFIG
    function renderConfig() {
        return `<div class="card"><h3>Configurações</h3><div><label>Estilo recibo: </label><select id="estiloRecibo"><option value="moderno">Moderno</option><option value="termico">Térmico</option></select><button class="btn" id="salvarEstiloRecibo">Salvar</button></div><hr><button class="btn" id="testarConexaoBtn"><i class="fas fa-plug"></i> Testar conexão Firebase</button><hr><button class="btn" id="resetSistemaBtn">Resetar dados (cuidado!)</button><button class="btn" id="exportarDadosBtn">Exportar JSON</button><button class="btn" id="importarDadosBtn">Importar JSON</button><input type="file" id="importFileInput" accept=".json" style="display:none;"></div>`;
    }
    async function attachConfigEvents() {
        const configSnap = await db.collection('config').doc('recibo').get();
        const estiloAtual = configSnap.exists ? configSnap.data().estilo : 'moderno';
        const select = document.getElementById('estiloRecibo');
        if(select) select.value = estiloAtual;
        document.getElementById('salvarEstiloRecibo')?.addEventListener('click', async () => {
            await db.collection('config').doc('recibo').set({ estilo: document.getElementById('estiloRecibo').value });
            showPush('Preferência salva');
        });
        document.getElementById('testarConexaoBtn')?.addEventListener('click', async () => {
            try {
                const testRef = db.collection('testes').doc('conn');
                await testRef.set({ timestamp: new Date().toISOString() });
                const snap = await testRef.get();
                if(snap.exists) showPush("✅ Conexão com Firebase OK!");
                else showPush("⚠️ Conexão estabelecida, mas documento não persistiu.", true);
            } catch(e) {
                showPush("❌ Erro de conexão: " + e.message, true);
            }
        });
        document.getElementById('resetSistemaBtn')?.addEventListener('click', async () => {
            if(confirm('Resetar TODOS os dados do sistema? Isso não pode ser desfeito.')) {
                try {
                    const collections = ['produtos', 'clientes', 'vendas', 'users', 'logs'];
                    for(const col of collections) {
                        const snap = await db.collection(col).get();
                        const batch = db.batch();
                        snap.docs.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                    }
                    await inicializarDados();
                    showPush('Sistema resetado');
                    location.reload();
                } catch(e) {
                    showPush("Erro ao resetar: " + e.message, true);
                }
            }
        });
        document.getElementById('exportarDadosBtn')?.addEventListener('click', async () => {
            try {
                const data = {
                    produtos: (await db.collection('produtos').get()).docs.map(d => d.data()),
                    clientes: (await db.collection('clientes').get()).docs.map(d => d.data()),
                    vendas: (await db.collection('vendas').get()).docs.map(d => d.data())
                };
                const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup_3r.json'; a.click();
                showPush("Exportação concluída");
            } catch(e) {
                showPush("Erro ao exportar: " + e.message, true);
            }
        });
        const importBtn = document.getElementById('importarDadosBtn');
        const fileInput = document.getElementById('importFileInput');
        importBtn?.addEventListener('click', () => fileInput.click());
        fileInput?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if(imported.produtos) for(const p of imported.produtos) await db.collection('produtos').doc(p.id || Date.now().toString()).set(p);
                        if(imported.clientes) for(const c of imported.clientes) await db.collection('clientes').doc(c.id || Date.now().toString()).set(c);
                        if(imported.vendas) for(const v of imported.vendas) await db.collection('vendas').doc(v.id || Date.now().toString()).set(v);
                        showPush('Dados importados!');
                        renderApp();
                    } catch(e) { showPush('Arquivo inválido: ' + e.message, true); }
                };
                reader.readAsText(file);
            }
        });
    }

    async function attachEvents() {
        if (currentSection === 'vendas') await attachVendasEvents();
        if (currentSection === 'produtos') await attachProdutosEvents();
        if (currentSection === 'clientes') await attachClientesEvents();
        if (currentSection === 'relatorios') await attachRelatoriosEvents();
        if (currentSection === 'config') await attachConfigEvents();
        if (currentSection === 'usuarios') await attachUsuariosEvents();
    }

    // Inicialização
    (async () => {
        await inicializarDados();
        await renderApp();
    })();
</script>
</body>
</html>
